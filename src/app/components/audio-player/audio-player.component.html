<div class="audio-player">
  <audio
    #audioElement
    [src]="audioCall?.fileUrl"
    (loadedmetadata)="onLoadedMetadata()"
    (timeupdate)="onTimeUpdate()"
    (ended)="onAudioEnded()"
    crossorigin="anonymous"
  ></audio>

  <div class="player-controls">
    <button class="play-btn" (click)="togglePlayPause()" [class.playing]="isPlaying">
      {{ isPlaying ? '⏸' : '▶' }}
    </button>

    <div class="progress-bar">
      <div class="progress" [style.width.%]="duration > 0 ? (currentTime / duration) * 100 : 0"></div>
    </div>

    <span class="time-info">{{ formatTime(currentTime) }} / {{ formatTime(duration) }}</span>
  </div>

  <button
    class="transcribe-btn"
    (click)="transcribeAudio()"
    [disabled]="isTranscribing || !audioCall?.file || hasTranscription"
    [class.loading]="isTranscribing"
  >
    {{ isTranscribing ? 'Transcribing...' : hasTranscription ? '✓ Transcribed' : '🎤 Transcribe' }}
  </button>
</div>
