<div class="upload-container">
  <div
    class="upload-area"
    [class.dragging]="isDragging"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave()"
    (drop)="onDrop($event)"
  >
    <div class="upload-content">
      <div class="upload-icon">📁</div>
      <h3>Upload Audio Calls</h3>
      <p>Drag & drop audio files here or click to select</p>
      <button class="upload-btn" (click)="triggerFileInput()">
        Choose Files
      </button>
      <p class="file-info">Supported formats: MP3, WAV, M4A, WebM, OGG</p>
    </div>
  </div>

  <input
    #fileInput
    type="file"
    multiple
    accept="audio/*"
    style="display: none"
    (change)="onFileSelected($event)"
  />

  <div class="uploaded-files" *ngIf="(audioCalls$ | async) as audioCalls">
    <h4 *ngIf="audioCalls.length > 0">Audio Calls ({{ audioCalls.length }})</h4>
    <ul *ngIf="audioCalls.length > 0">
      <li
        *ngFor="let audioCall of audioCalls"
        (click)="selectAudio(audioCall)"
        [class.selected]="selectedAudioId === audioCall.id"
        class="audio-item"
      >
        <span class="audio-icon">🔊</span>
        <span class="audio-name">{{ audioCall.fileName }}</span>
        <span class="status" *ngIf="audioCall.isTranscribing" class="transcribing">⏳</span>
        <span class="status" *ngIf="audioCall.transcription && !audioCall.isTranscribing" class="transcribed">✓</span>
      </li>
    </ul>
    <div *ngIf="audioCalls.length === 0" class="no-files">No audio files uploaded</div>
  </div>
</div>
